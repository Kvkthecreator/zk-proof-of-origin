<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog · zk-proof-of-origin</title>
  <style>
    :root { --bg: #fdfdfc; --fg: #1a1a1a; --muted: #666; --accent: #2563eb; --border: #e5e5e5; }
    @media (prefers-color-scheme: dark) { :root { --bg: #0f1115; --fg: #e4e4e7; --muted: #9ca3af; --accent: #60a5fa; --border: #27272a; } }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--fg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 17px; line-height: 1.7; -webkit-font-smoothing: antialiased; }
    nav { max-width: 720px; margin: 0 auto; padding: 20px 24px 0; display: flex; justify-content: space-between; font-size: 14px; }
    nav a { color: var(--muted); text-decoration: none; }
    nav a:hover { color: var(--accent); }
    main { max-width: 720px; margin: 0 auto; padding: 32px 24px 80px; }
    h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 32px; }
    .post { padding: 20px 0; border-bottom: 1px solid var(--border); }
    .post:first-of-type { border-top: 1px solid var(--border); }
    .post a { color: var(--fg); text-decoration: none; display: block; }
    .post a:hover .post-title { color: var(--accent); }
    .post-title { font-size: 1.15rem; font-weight: 600; margin: 0 0 4px; }
    .post-meta { color: var(--muted); font-size: 0.9rem; margin: 0 0 8px; }
    .post-excerpt { color: var(--muted); font-size: 0.95rem; margin: 0; }
  </style>
</head>
<body>
  <nav>

    <a href="https://github.com/Kvkthecreator/zk-proof-of-origin">GitHub</a>
  </nav>
  <main>

    <div class="post">
      <a href="./zk-ecdsa-primitive/">
        <p class="post-title">Building the Primitive Mina's Funded Reclaim Integration Was Missing</p>

        <p class="post-excerpt">An in-circuit ECDSA-secp256k1 attestor verifier for Mina, why we built it, and how to use it.</p>
      </a>
    </div>
  </main>
</body>
</html>
