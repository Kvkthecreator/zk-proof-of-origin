name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install workspace deps
        run: npm ci

      - name: Build web
        working-directory: packages/web
        run: npm run build

      # Requires one-time manual enable in repo Settings → Pages →
      # Source: GitHub Actions. The default GITHUB_TOKEN cannot create
      # a Pages site (even with pages:write) — only a PAT with admin
      # repo rights can, and adding a PAT as a secret is more ceremony
      # than a single click in Settings.
      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
